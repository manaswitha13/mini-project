{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="glass-card">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1>
                Route History
            </h1>

            <a href="/dashboard"
               class="btn btn-primary">

                Dashboard

            </a>

        </div>

        <div class="table-responsive">

            <table class="table table-dark table-hover">

                <thead>

                    <tr>

                        <th>Source</th>
                        <th>Destination</th>
                        <th>Route</th>
                        <th>Distance</th>
                        <th>Date</th>

                    </tr>

                </thead>

                <tbody>

                    {% for row in records %}

                    <tr>

                        <td>
                            {{ row.source }}
                        </td>

                        <td>
                            {{ row.destination }}
                        </td>

                        <td>
                            {{ row.route }}
                        </td>

                        <td>
                            {{ row.distance }} km
                        </td>

                        <td>
                            {{ row.created_at.strftime('%d-%m-%Y %H:%M') }}
                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
